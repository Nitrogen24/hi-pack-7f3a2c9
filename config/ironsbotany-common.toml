
["Master Toggles"]
	#============================================================
	#MASTER CONTROL - Use these for quick configuration
	#============================================================
	#BARE-BONES MODE: Disable all deep synergy features.
	#Only mana conversion remains active.
	#Perfect for simple integration or performance-critical servers.
	bareBonesMode = false
	#DEEP SYNERGY MASTER TOGGLE: Enable all 6 deep synergy stages.
	#Disable this to turn off catalysts, channels, auras, events, corporea, and alfheim.
	#Overrides individual stage toggles when set to false.
	enableDeepSynergy = true

["Mana System"]
	#============================================================
	#MANA UNIFICATION - Choose how Botania and ISS mana interact
	#============================================================
	#Mana unification mode:
	#BOTANIA_PRIMARY - ISS spells consume Botania mana directly
	#ISS_PRIMARY - Botania items grant ISS mana
	#HYBRID - Both systems work together with conversion (default)
	#SEPARATE - No conversion, dual-cost required
	#DISABLED - No mana integration
	#Allowed Values: BOTANIA_PRIMARY, ISS_PRIMARY, HYBRID, SEPARATE, DISABLED
	manaUnificationMode = "HYBRID"
	#How much Botania mana equals 1 ISS mana (default: 1000)
	#Only used in HYBRID and ISS_PRIMARY modes
	#Range: 100 ~ 10000
	conversionRatio = 1000
	#Allow converting ISS mana back to Botania mana
	#Only used in HYBRID mode
	bidirectionalConversion = false
	#How much ISS mana equals 1 Botania mana for reverse conversion
	#Only used when bidirectionalConversion is true
	#Range: 100 ~ 10000
	reverseConversionRatio = 800
	#Enable Botanical spells that consume both mana types
	#Forced to true in SEPARATE mode, ignored in BOTANIA_PRIMARY and ISS_PRIMARY
	enableDualCost = true
	#Max ISS mana in Spell Reservoir augmented pools
	#Range: 500 ~ 5000
	reservoirCapacity = 1000
	#Mana transfer rate per second from Botanical Focus (Botania mana)
	#Range: 100 ~ 10000
	manaTransferRate = 1000
	#Max ISS mana stored in a Mana Conduit block
	#Range: 100 ~ 5000
	manaConduitCapacity = 500
	#Botania mana drained per tick cycle from an adjacent mana pool
	#Range: 500 ~ 50000
	manaConduitConversionRate = 5000
	#Radius (in blocks) within which the Mana Conduit distributes ISS mana to players
	#Range: 1 ~ 32
	manaConduitRadius = 8
	#ISS mana transferred per second from functional blocks (Conduit, Reservoir) to nearby players
	#Range: 1 ~ 100
	blockEntityTransferRate = 5
	#Allow spells to draw Botania mana directly from nearby mana pools
	#When enabled, spells check nearby pools as a fallback if inventory mana is insufficient
	enableManaPoolAccess = true
	#Radius to search for Botania mana pools when drawing mana for spells
	#Range: 4 ~ 16
	manaPoolSearchRadius = 8

[Spells]
	#Damage multiplier for Botanical school spells
	#Range: 0.5 ~ 2.0
	botanicalPowerMultiplier = 1.0
	#Enable the Botanical spell school
	enableBotanicalSchool = true
	#Cooldown multiplier for Botanical spells
	#Range: 0.5 ~ 2.0
	spellCooldownMultiplier = 1.0
	#Emit Iron's Botany-signature particles on spell cast (petal/botanical_burst/mana_transfer layered onto vanilla VFX). Server-authoritative.
	enableSpellParticles = true
	#Emit ambient particles from active Spell Reservoir and Mana Conduit blocks.
	enableBlockAmbientParticles = true

