["Casting Channels"]
	#Stage 2: Hardware vs Software - Casting performance profiles
	#Enable casting channel system
	#Disabled in bare-bones mode
	enableCastingChannels = true
	#Global multiplier for casting channel effects
	#Range: 0.1 ~ 5.0
	channelPowerMultiplier = 1.0

["Spell Catalysts"]
	#Stage 1: Spell Augmentation - Items modify spell behavior
	#Enable Botania items as spell catalysts
	#Disabled in bare-bones mode
	enableSpellCatalysts = true
	#Chance (0.0-1.0) that catalyst is consumed on spell cast
	#Range: 0.0 ~ 1.0
	catalystConsumptionChance = 0.0
	#Durability damage to catalyst items per spell cast (0 = no damage)
	#Range: 0 ~ 100
	catalystDurabilityDamage = 0
	#Allow multiple catalysts to stack effects
	allowMultipleCatalysts = true
	#Maximum number of catalysts that can affect one spell
	#Range: 1 ~ 10
	maxCatalystsPerSpell = 3
	#Global multiplier for catalyst effect strength
	#Range: 0.1 ~ 5.0
	catalystPowerMultiplier = 1.0

["Flower Auras"]
	#Enable functional flowers as spell enhancers
	enableFlowerAuras = true
	#Multiplier for flower aura ranges
	#Range: 0.1 ~ 5.0
	flowerAuraRangeMultiplier = 1.0
	#Multiplier for flower aura effect strength
	#Range: 0.1 ~ 5.0
	flowerAuraStrengthMultiplier = 1.0
	#Allow multiple flower auras to stack
	allowAuraStacking = true
	#Maximum number of flower auras that can affect one spell
	#Range: 1 ~ 20
	maxActiveAuras = 5
	#Show particle effects for active auras
	showAuraParticles = true

["Spell-Triggered Mana Events"]
	#EXPERIMENTAL: Enable spells to affect Botania mana networks. Most effects are not yet fully functional except Water Fill.
	enableSpellManaEvents = false
	#Duration of spell-triggered mana effects (ticks)
	#Range: 20 ~ 6000
	manaEventDuration = 200
	#Intensity multiplier for mana network effects
	#Range: 0.1 ~ 5.0
	manaEventIntensity = 1.0
	#Radius for spell-triggered mana effects
	#Range: 1 ~ 32
	manaEventRadius = 8

["Corporea Logistics"]
	#EXPERIMENTAL: Enable Corporea integration for spell logistics.
	#Off by default — when enabled, only ritual-grade spells
	#(Gaia's Wrath, Mana Rebirth) request reagents via Corporea.
	#See the 1.7.0 audit for the rationale on tight scoping.
	enableCorporeaLogistics = false
	#Automatically request spell reagents from Corporea
	autoRequestReagents = true
	#Radius to search for Corporea Index
	#Range: 4 ~ 64
	corporeaSearchRadius = 16

["Alfheim Integration"]
	#Enable spell power boost in Alfheim dimension
	enableAlfheimBoost = true
	#Power multiplier for spells cast in Alfheim
	#Range: 1.0 ~ 5.0
	alfheimPowerMultiplier = 1.5
	#Enable dual-school scrolls crafted in Alfheim
	enableDualSchoolScrolls = true
	#Enable spellbook attunement in Alfheim
	enableSpellbookAttunement = true

["Phase 4 — Content Expansion"]
	#============================================================
	#New 1.7.0 features. Defaults follow the 1.7.0 audit.
	#============================================================
	#Pool Attunement Charm: a worn curio that binds one Botania
	#mana pool as a supplementary source for Nature-school spells.
	#Binding requires the Spell Overcharge unlock (Gaia Guardian kill).
	enablePoolAttunement = true
	#Maximum block-distance between the player and a bound pool
	#for the pool to contribute mana. Pools beyond this range are
	#ignored even if bound.
	#Range: 8 ~ 256
	poolAttunementRange = 64
	#Maximum Botania mana a bound pool can supply per cast
	#(cap; smaller costs draw less). Prevents the charm from
	#becoming an infinite battery for every spell.
	#Range: 1000 ~ 1000000
	poolAttunementBandwidth = 50000
	#EXPERIMENTAL: Enable Elven Bloom Scrolls — rune-enhanced
	#scrolls crafted near an Alfheim portal gain +1 effective
	#spell level. Off by default; enable for pack-side endgame.
	enableElvenBloomScrolls = false

